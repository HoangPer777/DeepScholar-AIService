name: Deploy AI Service

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/deepscholar-ai:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/deepscholar-ai:latest

            docker stop deepscholar-ai || true
            docker rm deepscholar-ai || true

            docker run -d \
              --name deepscholar-ai \
              --restart unless-stopped \
              --memory 500m \
              -p 8001:8001 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e REDIS_URL="${{ secrets.REDIS_URL }}" \
              -e BACKEND_API_URL="${{ secrets.BACKEND_API_URL }}" \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
              -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              -e TAVILY_API_KEY="${{ secrets.TAVILY_API_KEY }}" \
              -e LLAMAPARSE_API_KEY="${{ secrets.LLAMAPARSE_API_KEY }}" \
              -e INTERNAL_SERVICE_KEY="${{ secrets.INTERNAL_SERVICE_KEY }}" \
              -e EMBEDDING_PROVIDER="${{ secrets.EMBEDDING_PROVIDER }}" \
              -e EMBEDDING_DIMENSION="${{ secrets.EMBEDDING_DIMENSION }}" \
              -e AGENT_LLM_PROVIDER="${{ secrets.AGENT_LLM_PROVIDER }}" \
              -e GROQ_LLM_MODEL="${{ secrets.GROQ_LLM_MODEL }}" \
              -e CORS_ALLOW_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}" \
              -e GOOGLE_EMBEDDING_MODEL="${{ secrets.GOOGLE_EMBEDDING_MODEL }}" \
              -e GROQ_MODEL="${{ secrets.GROQ_MODEL }}" \
              -e GROQ_FAST_MODEL="${{ secrets.GROQ_FAST_MODEL }}" \
              -e GOOGLE_CSE_ID="${{ secrets.GOOGLE_CSE_ID }}" \
              -e AWS_ENDPOINT_URL="${{ secrets.AWS_ENDPOINT_URL }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_STORAGE_BUCKET_NAME="${{ secrets.AWS_STORAGE_BUCKET_NAME }}" \
              -e AWS_S3_REGION_NAME="${{ secrets.AWS_S3_REGION_NAME }}" \
              ${{ secrets.DOCKER_USERNAME }}/deepscholar-ai:latest
