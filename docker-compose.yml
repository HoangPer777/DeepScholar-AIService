services:
  ai-service:
    build: .
    container_name: deepscholar-ai
    environment:
      # Postgres & Redis run in DeepScholar-Backend's compose, accessible via host.docker.internal
      - DATABASE_URL=postgresql://deepscholar:deepscholar@host.docker.internal:5432/deepscholar
      - REDIS_URL=redis://host.docker.internal:6379/0
      # Backend API URL: AI service calls this to save extracted title/abstract/content
      - BACKEND_API_URL=http://host.docker.internal:8000/api/v1
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8001:8001"
